apiVersion: v1
kind: Service
metadata:
    name: {{.Values.service.name}}
    namespace: {{.Values.namespace}}
    lables:
        app: server
        role: stable
spec:
    selector:
        app: server
    ports:
        - name: http
          protocol: TCP
          port: {{.Values.service.port}}
          targetPort: {{.Values.service.targetPort}}
    sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
    name: {{.Values.canaryService.name}}
    namespace: {{.Values.namespace}}
    labels:
        app: server
        role: canary
spec:
    selector:
        app: server
    ports:
        - name: http
          protocol: TCP
          port: {{.Values.service.port}}
          targetPort: {{.Values.service.targetPort}}
    sessionAffinity: None