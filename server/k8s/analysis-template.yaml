apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: server-success-rate
  namespace: server-backend
spec:
  metrics:
    - name: success-rate
      interval: 30s
      count: 3
      successCondition: result == "true"
      failureLimit: 2
      provider:
        web:
          url: http://{{args.service-name}}.server-backend.svc.cluster.local/health
          jsonPath: '{$.status}'
          timeoutSeconds: 10
