name: CI PIPELINE

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{github.sha}}

jobs:
  # Install and Cache Dependencies

  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      
      - name: Install Dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v3
        with: 
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
          restore-keys: |
            ${{runner.os}}-node

  # Lint and Format Check
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
      
      - name: Run ESlint
        run: npm run lint
      
      - name: Run Prettier check
        run: npm run format:check
      

# Unit tests + coverage
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
      
      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Check coverage threshold
        run: |
          COVERAGE=${cat coverage/coverage-summary.json | jq '.total.lines.pct'}
          echo "Coverage: $COVERAGE%"
          if(($(echo "$COVERAGE < 80" | bc -l))); then
            echo "Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi
# Integration Test
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: npm run test:integration

# Security Scanning
  securtiy:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  #Full history for secret scanning
      
      - name: Run Trufflehog (secret scanning)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{github.event.repository.default_branch}}
          head: HEAD
    
    # Static Application Security Testing
      - name: Run Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/owasp-top-ten
            p/nodejs

    # Dependency vulnerability scan
      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN}}
        with:
          args: --severity-threshold=high


  sonarqube:
    name: Sonarqube Analysis
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #shallow clones disabled - Sonarqube needs full history for blame
      
      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
      
    # Download the coverage report generated in the unit-tests job
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      # Sonarqube scanner analysis
      # #   - Bugs & code smells
      #   - Security vulnerabilities (SAST)
      #   - Code duplication
      #   - Test coverage (from lcov.info)
      #   - Technical debt
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}
        with:
          args: >
            -Dsonar.projectKey=my-app
            -Dsonar.projectName="My App"
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.js,**/*.spec.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.test.js,**/*.spec.js,**/node_modules/**
            -Dsonar.cpd.exclusions=**/*.test.js
    
    # Quality Gate - blocks pipeline if SonarQube score fails
    # e.g. coverage dropped, new bugs introduced, security issues found
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}

  # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security, sonarqube]
    outputs:
      image-uri: ${{steps.build-push.outputs.image-uri}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false 
          load: true
          tags: |
            ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{env.IMAGE_TAG}}
            ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{github.ref_name}}
            ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Save image uri
        id: build-push
        run: |
          echo "image-uri=${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{env.IMAGE_TAG}}" >> $GITHUB_OUTPUT
# Docker Image Security Scan
  image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Trivy scans the image for OS + library vulnerabilities
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{needs.build.outputs.image-uri}}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1" #Fail pipeline on CRITICAL OR HIGH
      
      - name: Upload Trivy Scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

# push to ecr
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        run: |
          docker push ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{env.IMAGE_TAG}}
          docker push ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{github.ref_name}}
          docker push ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:latest

      # Sign the image for integrity verfification
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image
        run : |
          cosign sign --yes \
            ${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{env.IMAGE_TAG}}

      - name: Clean up old ECR images (keep last 10)
        run: |
          aws ecr describe-images \
            --repository-name ${{env.ECR_REPOSITORY}}\
            --query 'sort_by(imageDetails, & imagePushedAt)[:-10].imageDigest' \
            --output text | \
          xargs -I{} aws ecr batch-delete-image \
            --repository-name ${{env.ECR_REPOSITORY}} \
            --image-ids imageDigest={}

# Notify on failure
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security, build, image-scan, push-to-ecr, sonarqube]
    if: failure()
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "CI PIPELINE FAILED!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *CI PIPELINE FAILED*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>*"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{secrets.SLACK_WEBHOOK_URL}}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
  
       
