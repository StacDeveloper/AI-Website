name: CI PIPELINE

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  AWS_REGION: eu-north-1a
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{github.sha}}

jobs:
  # Install and Cache Dependencies

  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Dependencies
        uses: actions/cache@v3
        with: 
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock-json')}}
          restore-keys: |
            ${{runner.os}}-node

  # Lint and Format Check
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock-json')}}
      
      - name: Run ESlint
        uses: npm run lint
      
      - name: Run Prettier check
        uses: npm run format:check
      

# Unit tests + coverage
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock.json')}}
      
      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Check coverage threshold
        run: |
          Coverage=${cat coverage/coverage-summery.json | jq '.total.lines.pct'}
          echo "Coverage: $COVERAGE%"
          if(($(echo "$COVERAGE < 80" | bc -l))); then
            echo "Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi
# Integration Test
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{runner.os}}-node-${{hashFiles('package-lock-json')}}
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: npm run test:integration

# Security Scanning
  securtiy:
    name: Security Scanning
    runs-on: ubunut-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  #Full history for secret scanning
      
      - name: Run Trufflehog (secret scanning)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{github.event.repository.default_branch}}
          head: HEAD
    
    # Static Application Security Testing
      - name: Run Semgrep (SAST)
        uses: semgrep/semgrep-actions@v1
        with:
          config: >-
            p/default
            p/owasp-top-ten
            p/nodejs

    # Dependency vulnerability scan
      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Synk vulnerability scan
        uses: synk/actions/node@master
        env:
          SYNK_TOKEN: ${{secrets.SYNK_TOKEN}}
        with:
          args: --severity-threshold=high

  # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security]
    outputs:
      image-uri: ${{steps.build-push.outputs.image-uri}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credential@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: false 
          load: true
          tags: |
            ${{steps.login-ecr.output.registry}}/${{env.ECR_REPOSITORY}}:${{env_IMAGE_TAG}}
            ${{steps.login-ecr.output.registry}}/${{env.ECR_REPOSITORY}}:${{github.ref_name}}
            ${{steps.login-ecr.output.registry}}/${{env.ECR_REPOSITORY}}:latest
          cache-from: type=gha
          cache-to: type=gha, mode=max
      
      - name: Save image uri
        id: build-push
        run: |
          echo "image-uri=${{steps.login-ecr.outputs.registry}}/${{env.ECR_REPOSITORY}}:${{env.IMAGE_TAG}}" >> $GITHUB_OUTPUT
# Docker Image Security Scan
  image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Trivy scans the image for OS + library vulnerabilities
      - name: Run Trivy Image Scan
        uses: aquqsecurity/trivy-action@master
        with:
          image-ref: ${{needs.build.outputs.image-uri}}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL, HIGH"
          exit-code: "1" #Fail pipeline on CRITICAL OR HIGH
      
      - name: Upload Trivy Scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"



  
       
